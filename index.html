<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bikaner Sweets &amp; Dairy - Premium Sweets, Namkeen &amp; Dairy • Sector 22 Dwarka">
    <title>Bikaner Sweets &amp; Dairy • Dwarka</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Poppins:wght@300;400;500;600&amp;display=swap">
    <style>
        :root {
            --bg: #090909;
            --gold: #D4AF37;
            --gold-light: #F5D76E;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: #fff;
            line-height: 1.6;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }

        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #090909;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease;
        }
        .loader-spin {
            width: 64px;
            height: 64px;
            border: 5px solid #222;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 800ms linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(9,9,9,0.97);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1.1rem 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212,175,55,0.15);
        }
        .logo {
            font-size: 1.85rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(9,9,9,0.65), rgba(9,9,9,0.75)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-inner {
            max-width: 820px;
            padding: 0 20px;
        }
        .hero-inner h1 {
            font-size: 4.2rem;
            margin-bottom: 16px;
        }

        .btn {
            background: var(--gold);
            color: #000;
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(212,175,55,0.4); }

        #menu { padding: 140px 5% 100px; }
        .section-title {
            text-align: center;
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 50px;
        }
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }
        .search-container {
            position: relative;
            width: 420px;
        }
        .search-container input {
            width: 100%;
            padding: 18px 24px 18px 55px;
            background: #1c1c1c;
            border: 1px solid #444;
            border-radius: 9999px;
            color: white;
            font-size: 1.05rem;
        }
        .cat-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cat-btn {
            padding: 10px 26px;
            background: #1f1f1f;
            border: 1px solid #555;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: var(--gold);
            color: #000;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 26px;
            max-width: 1480px;
            margin: 0 auto;
        }
        .menu-card {
            background: rgba(22,22,22,0.95);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s, box-shadow 0.4s;
            border: 1px solid rgba(212,175,55,0.15);
        }
        .menu-card:hover {
            transform: translateY(-14px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .menu-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .card-body {
            padding: 22px;
        }
        .item-name {
            font-size: 1.35rem;
            font-weight: 600;
        }
        .price {
            color: var(--gold);
            font-size: 1.45rem;
            font-weight: 700;
        }
        .item-meta {
            color: #aaa;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .floating-wa {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 30px rgba(37,211,102,0.4);
            z-index: 999;
            text-decoration: none;
        }

        footer {
            background: #000;
            padding: 70px 5% 40px;
            text-align: center;
            color: #777;
        }
    </style>
</head>

        let currentFilter = 'all';

        function populateCategories() {
            const cats = [...new Set(fullMenu.map(item => item.category))];
            const container = document.getElementById('categoryFilters');
            container.innerHTML = `<button class="cat-btn active" onclick="filterCategory(this, 'all')">All</button>`;
            
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.textContent = cat;
                btn.onclick = () => filterCategory(btn, cat);
                container.appendChild(btn);
            });
        }

        function filterCategory(btn, cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = cat;
            filterMenu();
        }

        function filterMenu() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = fullMenu;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.category === currentFilter);
            }
            if (term) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(term) || 
                    item.category.toLowerCase().includes(term)
                );
            }
            renderMenu(filtered);
        }

        function renderMenu(items) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <img src="https://picsum.photos/id/${300 + Math.floor(Math.random()*700)}/700/320" alt="${item.name}" loading="lazy">
                    <div class="card-body">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">${item.category}</div>
                        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:end;">
                            <div class="price">${item.price}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initialize
        window.onload = function() {
            // Hide loader
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1000);

            populateCategories();
            renderMenu(fullMenu);
        };
